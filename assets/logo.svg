<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1A1B26"/>
      <stop offset="100%" stop-color="#24283B"/>
    </linearGradient>
    <linearGradient id="primary" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7AA2F7"/>
      <stop offset="100%" stop-color="#BB9AF7"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#9ECE6A"/>
      <stop offset="100%" stop-color="#73DACA"/>
    </linearGradient>
  </defs>
  <rect width="100%" height="100%" rx="80" fill="url(#bg)"/>
  
  <!-- Kanban Columns -->
  <rect x="80" y="80" width="60" height="240" rx="10" fill="#292E42"/>
  <rect x="170" y="80" width="60" height="240" rx="10" fill="#292E42"/>
  <rect x="260" y="80" width="60" height="240" rx="10" fill="#292E42"/>
  
  <!-- Cards moving -->
  <rect x="90" y="100" width="40" height="60" rx="6" fill="#565F89" opacity="0.5"/>
  
  <!-- The active agent card -->
  <rect x="180" y="140" width="40" height="60" rx="6" fill="url(#primary)"/>
  
  <!-- Completed card -->
  <rect x="270" y="220" width="40" height="60" rx="6" fill="url(#accent)"/>
  
  <!-- AI Sparkle on the active card -->
  <path d="M190 170 Q200 170 200 160 Q200 170 210 170 Q200 170 200 180 Q200 170 190 170 Z" fill="#FFFFFF"/>
</svg>
